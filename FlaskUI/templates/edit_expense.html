<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div>
        <form method="POST">
            Category: <input type="text" name="category" value="{{ expense.category }}" required>
            <br>
            Description: <input type="text" name="description" value="{{ expense.description }}" >
            <br>
            Amount (RON): <input type="number" name="amount" step="0.01" min="0.01" value="{{ expense.amount }}" required>
            <br>
            Date: <input type="date" name="date" value="{{ expense.date }}" required>
            <button type="submit">Update</button>
            <a href="/expenses" style="color: red">Cancel</a>
        </form>
    </div>
</body>
</html>
