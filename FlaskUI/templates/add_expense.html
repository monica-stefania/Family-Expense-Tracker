<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add new expense</title>
</head>
<body>
    <h1>Add Expense</h1>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <div>
        <form method="POST">
            Category: <input type="text" name="category" required>
            <br>
            Description: <input type="text" name="description">
            <br>
            Amount (RON): <input type="number" name="amount" step="0.01" min="0.01" required>
            <br>
            Date: <input type="date" name="date" required>
            <br>
            <button type="submit">Save</button>
            <a href="/expenses" style="color: red">Cancel</a>
        </form>
    </div>

</body>
</html>
